  - '@oxc-project/*'
  - '@oxlint/*'
  - '@oxfmt/*'
  - '@oxlint-tsgolint/*'
  - '@rolldown/*'
  - '@tsdown/*'
  - oxlint
  - oxfmt
  - oxlint-tsgolint
